<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Powder</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#0b1a2b, #132b4a);
    color: white;
}


.app {
    padding: 20px;
}


.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.score {
    margin-top: 20px;
    text-align: center;
}

.circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 10px solid #6c63ff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin: auto;
}

/* Cartão */
.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    margin-top: 15px;
}


.player {
    text-align: center;
    margin-top: 20px;
}

button {
    background: #6c63ff;
    border: none;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #5848e5;
}

/*botão de navegação*/
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: #0b1a2b;
    padding: 10px 0;
}


</style>
</head>

<body>

<div class="app">

    <div class="header">
        <h3>Boa noite, Fabio</h3>
        <img src="imagens e logos/logo.jpeg" style="width: 70px; height: auto;">
    </div>

    <div class="score">
        <div class="circle">87</div>
        <p>Sono ótimo</p>
    </div>

    <div class="card">
        <h4>Resumo da noite</h4>
        <p>Duração: 7h 45m</p>
        <p>Sono profundo: 1h 12m</p>
    </div>

    <div class="card">
        <h4>Sons relaxantes</h4>
        <p>Chuva tranquila</p>
        <div class="player">
            <button onclick="playAudio()">▶️ Play</button>
            <button onclick="pauseAudio()">⏸️ Pause</button>
        </div>
    </div>

</div>

<div class="nav">
    <a href="index.html"><button>Início</button></a>
   <a href="Time.html" target="_self"><button>Time</button></a>
    <a href="playlist.html" target="_self"><button>playlist</button></a>
   <a href="config.html" target="_self"><button>config</button></a>
   
</div>

<audio id="audio">
    <source src="musicas/Ruth B. - Dandelions (Lyrics) slowed + reverb - Aurora Vibes (youtube).mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");

function playAudio() {
    audio.play();
}

function pauseAudio() {
    audio.pause();
}
</script>

</body>
</html>
